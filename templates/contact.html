<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | PromptDB</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">P</span>
            <span><strong>PromptDB</strong><small>AI MongoDB Console</small></span>
        </a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="/">Console</a>
            <a href="/users">Users</a>
            <a href="/logs">Audit Logs</a>
            <a href="/features">Features</a>
            <a href="/about">Architecture</a>
            <a href="/contact" class="active">Contact</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main class="content-page">
        <section class="contact-layout">
            <div class="page-intro">
                <p class="eyebrow">Contact</p>
                <h1>Mohd Mubasshir Khan</h1>
                <p>Full-stack developer focused on practical AI applications, backend systems, and clean product interfaces.</p>

                <div class="contact-links">
                    <a href="mailto:mubkhids.official@gmail.com">mubasshirkhan9336@gmail.com</a>
                </div>
            </div>

            <form class="contact-card" id="contact-form">
                <h2>Message</h2>
                <label>
                    Name
                    <input type="text" id="contact-name" placeholder="Your name" required />
                </label>
                <label>
                    Email
                    <input type="email" id="contact-email" placeholder="you@example.com" required />
                </label>
                <label>
                    Message
                    <textarea id="contact-message" rows="5" placeholder="Write a short message" required></textarea>
                </label>
                <button type="submit">Submit</button>
                <p class="form-note" id="contact-note"></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <span>PromptDB</span>
        <span>AI MongoDB Console</span>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
