<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - PromptDB</title>
    <link rel="stylesheet" href="static/style.css" />
</head>
<body>
    <nav class="pill-navbar">
        <!-- <a href="/" class="brand">PromptDB</a> -->
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/features">Features</a></li>
            <li><a href="/contact" class="active">Contact</a></li>
        </ul>
    </nav>
    <main>
        <div class="contact-section">
            <div class="contact-info">
                <h1>Get in Touch</h1>
                <p>I'd like to hear from you!</p>
                <p>If you have any inquiries or just want to say hi, please use the contact form.</p>
                <div class="contact-details">
                    <p>📧 mubkhids.official@gmail.com</p>
                    <div class="social-icons">
                        </div>
                </div>
            </div>
            <div class="contact-form">
                <form>
                    <div class="form-row">
                        <input type="text" id="firstName" placeholder="First Name" />
                        <input type="text" id="lastName" placeholder="Last Name" />
                    </div>
                    <input type="email" id="email" placeholder="Email *" required />
                    <textarea id="message" placeholder="Message"></textarea>
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 PromptDB. All rights reserved.</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a>
        </div>
    </footer>
    <script src="static/script.js"></script>
</body>
</html>
